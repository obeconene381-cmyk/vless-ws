name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ] # يخدم الكود غير كي ترفع ملفات لفرع main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          # اكتب معلوماتك هنا مباشرة مكان الكلمات الكبيرة
          username: coomarzon  # 👈 اسمك في دوكر هوب
          password: Omar@2008 # 👈 كلمة سر دوكر هوب

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # اسم الصورة: يوزرك/اسم_المستودع
          tags: coomarzon/my-vless:latest 
